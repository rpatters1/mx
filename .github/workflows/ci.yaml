name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-flight run when a newer push supersedes it. The group is keyed
# on the ref, so a new push to a PR cancels that PR's prior run without
# touching other PRs or master. Limited to pull_request events: each master
# push still runs to completion rather than aborting mid-build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux-gen:
    name: Linux (generator gates)
    runs-on: ubuntu-latest

    # Read-only token: this job builds untrusted fork PR code, so it never
    # requests write. The gen-quality comment is posted by the pr-comment.yaml
    # companion workflow (workflow_run) from the base-repo context instead.
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Container-driver builder (needed to export the gha layer cache) plus
      # the runtime-token export so the Makefile auto-detects
      # ACTIONS_RUNTIME_TOKEN and pushes/pulls the Docker layer cache. Keeps
      # the toolchain-install layer warm across runs. The same `make check`
      # runs locally with no cache (token absent -> plain build).
      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3

      # Back the mx-build volume with a workspace path so actions/cache can
      # persist the ccache dir it holds. Not circular: Docker resolves this
      # backing dir host-side, and the volume shadows /workspace/build inside
      # the container.
      - name: Create bind-backed build volume
        run: |
          mkdir -p build/docker
          docker volume create --driver local \
            --opt type=none --opt o=bind \
            --opt device="$GITHUB_WORKSPACE/build/docker" mx-build

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: build/docker/.ccache
          key: ccache-${{ runner.os }}-gen-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-gen-

      - name: fmt-check
        run: make check

      - name: Generator tests
        run: make test-gen

      - name: Audit tests
        run: make test-audit

      - name: plates --check (all targets)
        run: make gen-check

      # The committed generated output must match the generator: regenerate
      # every target, then any tracked-file drift fails the build.
      - name: Regenerate all targets
        run: make gen

      - name: Generated output drift check
        run: git diff --exit-code

      # Static-analysis gates on the gen/ generator. Each fails the build below
      # its floor (GEN_QUALITY_FLOOR / GEN_LINT_FLOOR in the Makefile).
      - name: gen-quality gate
        run: make gen-quality

      - name: gen-lint gate
        run: make gen-lint

      # Surface the score in the run summary and (on PRs) as a per-push comment.
      # always() so a gate failure still reports why.
      - name: gen-quality report
        if: always()
        run: |
          {
            echo '### gen-quality `gen/`'
            echo ''
            cat data/testOutput/gen-quality/report.md 2>/dev/null || echo '(no report produced)'
          } >> "$GITHUB_STEP_SUMMARY"

      # Fork PRs run with a read-only token, so this job can't post the comment
      # itself. Stage the body + PR number as an artifact; pr-comment.yaml posts
      # it after CI completes. always() so a gate failure still reports why.
      - name: Stage gen-quality PR comment
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p pr-comment
          {
            echo '### gen-quality `gen/`'
            echo ''
            cat data/testOutput/gen-quality/report.md 2>/dev/null || echo '(no report produced)'
            echo ''
            echo 'Commit `${{ github.sha }}`.'
          } > pr-comment/body.md
          echo '${{ github.event.pull_request.number }}' > pr-comment/number

      - name: Upload gen-quality PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment-gen
          path: pr-comment/

  linux-api:
    name: Linux (mx::api/mx::impl)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Create bind-backed build volume
        run: |
          mkdir -p build/docker
          docker volume create --driver local \
            --opt type=none --opt o=bind \
            --opt device="$GITHUB_WORKSPACE/build/docker" mx-build

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: build/docker/.ccache
          key: ccache-${{ runner.os }}-api-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-api-

      - name: Build mx library
        run: make lib

      - name: Run examples + mxtest suite (api/impl/file/control)
        run: make test

      - name: Run corpus api roundtrip (regression mode)
        run: make test-api-roundtrip

  linux-core:
    name: Linux (mx::core gates)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Create bind-backed build volume
        run: |
          mkdir -p build/docker
          docker volume create --driver local \
            --opt type=none --opt o=bind \
            --opt device="$GITHUB_WORKSPACE/build/docker" mx-build

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: build/docker/.ccache
          key: ccache-${{ runner.os }}-core-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-core-

      # corert is pinned at 829/0/0 by an in-suite counts case.
      - name: Core roundtrip suite
        run: make test-core-dev

      - name: Core unit tests
        run: make test-cpp-unit

      - name: validate-cpp (serialize + xmllint)
        run: make validate-cpp

      - name: probe-cpp (must-not-compile probes)
        run: make probe-cpp

  linux-targets:
    name: Linux (Go + C targets)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Create bind-backed build volume
        run: |
          mkdir -p build/docker
          docker volume create --driver local \
            --opt type=none --opt o=bind \
            --opt device="$GITHUB_WORKSPACE/build/docker" mx-build

      - name: Go corert suite
        run: make test-go

      - name: C corert suite
        run: make test-c

  coverage:
    name: Linux (coverage-core-dev)
    runs-on: ubuntu-latest

    # Read-only token: posting the coverage comment is delegated to the
    # pr-comment.yaml companion workflow so fork PRs get a comment too (their
    # GITHUB_TOKEN is capped to read-only here).
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Same container-driver + runtime-token setup as linux-gen so the
      # coverage stage reuses the warm toolchain layer cache. Coverage runs in
      # the pinned container via `make coverage-core-dev`; it is advisory (no
      # gate) and runs in parallel with the other jobs.
      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3

      # Bind-back mx-build so its ccache dir is cacheable, as in linux-gen. A
      # distinct key prefix keeps this job's save from racing the others.
      - name: Create bind-backed build volume
        run: |
          mkdir -p build/docker
          docker volume create --driver local \
            --opt type=none --opt o=bind \
            --opt device="$GITHUB_WORKSPACE/build/docker" mx-build

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: build/docker/.ccache
          key: ccache-${{ runner.os }}-coverage-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-coverage-

      - name: Build + run with coverage (core)
        run: make coverage-core-dev

      - name: Build + run with coverage (api/impl/utility)
        run: make coverage-api

      # Turn gcovr's 3-line summary (data/testOutput/coverage/summary.txt, e.g.
      # "lines: 52.1% (17624 out of 33846)") into a Markdown table reused by
      # both the job summary and the PR comment.
      - name: Build coverage table
        if: always()
        run: |
          make_table() {
            local file="$1"
            echo '| Metric | Coverage | Covered / Total |'
            echo '|---|---:|---:|'
            awk '/^(lines|functions|branches):/ {
              m=$1; sub(":","",m);
              c=$3; sub("[(]","",c);
              t=$6; sub("[)]","",t);
              M=toupper(substr(m,1,1)) substr(m,2);
              printf "| %s | %s | %s / %s |\n", M, $2, c, t
            }' "$file"
          }
          {
            echo '### Core-dev coverage `src/private/mx/core/`'
            echo ''
            make_table data/testOutput/coverage/summary.txt
            echo ''
            echo '### API coverage `src/private/mx/{api,impl,utility}/`'
            echo ''
            make_table data/testOutput/coverage/api/summary.txt 2>/dev/null || echo '(api coverage not produced)'
          } > table.md
          cat table.md >> "$GITHUB_STEP_SUMMARY"

      # Single self-contained page, stored (compression-level 0). GitHub still
      # delivers artifacts as a .zip -- there is no raw-file download -- so the
      # zip just holds one index.html to unzip and open.
      - name: Upload core HTML report
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core-dev
          path: data/testOutput/coverage/index.html
          compression-level: 0

      - name: Upload api HTML report
        id: upload-api
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: data/testOutput/coverage/api/index.html
          compression-level: 0

      # Stage the body + PR number as an artifact; pr-comment.yaml posts it
      # after CI completes (this job's fork-PR token is read-only). It posts a
      # fresh comment each run, so the PR keeps a per-push coverage history.
      - name: Stage PR comment
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p pr-comment
          {
            echo '### Coverage report'
            echo ''
            cat table.md
            echo ''
            echo '[Core HTML report](${{ steps.upload.outputs.artifact-url }}) | [API HTML report](${{ steps.upload-api.outputs.artifact-url }})'
            echo ''
            echo 'Commit `${{ github.sha }}`.'
          } > pr-comment/body.md
          echo '${{ github.event.pull_request.number }}' > pr-comment/number

      - name: Upload PR comment
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment-coverage
          path: pr-comment/

  macos:
    name: macOS (mx::core, AppleClang)
    runs-on: macos-latest

    # No Docker on the macOS runners: MX_RUNNING_IN_DOCKER=1 flips the
    # Makefile to its direct-invocation branch so the build runs natively
    # with AppleClang. This is the only job off the pinned toolchain, by
    # design: it exists to find (and keep finding) AppleClang fallout.
    env:
      MX_RUNNING_IN_DOCKER: 1

    steps:
      - uses: actions/checkout@v4

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-core-dev-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-core-dev-

      - name: Core roundtrip suite
        run: make test-core-dev

      - name: Core unit tests
        run: make test-cpp-unit

      - name: Build mx library (api/impl)
        run: make lib

      - name: Run examples + mxtest suite (api/impl)
        run: make test

      - name: Run corpus api roundtrip (regression mode)
        run: make test-api-roundtrip

  swift-local:
    name: macOS (Swift package, local checkout)
    runs-on: macos-latest

    # By default mx builds `Mx` as a source library straight from this checkout --
    # the path komp takes when it depends on a sibling mx via `.package(path:)`.
    # Building it here proves mx compiles as a Swift package under AppleClang/SPM on
    # every PR. The binary xcframework release arm (MX_BINARY_RELEASE) is follow-up work.

    steps:
      - uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Build the Mx Swift package (local-checkout source mode)
        run: swift build --product Mx
