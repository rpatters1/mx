name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  linux-gate:
    name: Linux (quality gate + tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Container-driver builder (needed to export the gha layer cache) plus
      # the runtime-token export so the Makefile auto-detects
      # ACTIONS_RUNTIME_TOKEN and pushes/pulls the Docker layer cache. Keeps
      # the toolchain-install layer warm across runs. The same `make check`
      # runs locally with no cache (token absent -> plain build).
      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Quality gate
        run: make check

      - name: Run tests
        run: make test

  linux-core:
    name: Linux (full test suite, GCC)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-core-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-core-

      - name: Full test suite
        run: make test-all

  macos:
    name: macOS (build + tests)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-build-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Run tests
        run: make test

  windows:
    name: Windows (build + tests)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install make
        run: choco install make -y

      - name: Run tests
        shell: bash
        run: make test

  xcode:
    name: Xcode (advisory)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate project
        run: make xcode-gen

      - name: Build
        run: make xcode-build

      - name: Test
        run: make xcode-test
