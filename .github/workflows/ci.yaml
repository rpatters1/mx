name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel an in-flight run when a newer push supersedes it. The group is keyed
# on the ref, so a new push to a PR cancels that PR's prior run without
# touching other PRs or master. Limited to pull_request events: each master
# push still runs to completion rather than aborting mid-build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux-gate:
    name: Linux (check + test)
    runs-on: ubuntu-latest

    # pull-requests: write lets the gen-quality score comment post on PRs.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # Container-driver builder (needed to export the gha layer cache) plus
      # the runtime-token export so the Makefile auto-detects
      # ACTIONS_RUNTIME_TOKEN and pushes/pulls the Docker layer cache. Keeps
      # the toolchain-install layer warm across runs. The same `make check`
      # runs locally with no cache (token absent -> plain build).
      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3

      # Back the mx-build volume with a workspace path so actions/cache can
      # persist the ccache dir it holds. `make check` mounts mx-build at
      # /workspace/build and ccache writes to build/docker/.ccache.
      # Not circular: Docker resolves this backing dir host-side, and the
      # volume shadows /workspace/build inside the container.
      - name: Create bind-backed build volume
        run: |
          mkdir -p build/docker
          docker volume create --driver local \
            --opt type=none --opt o=bind \
            --opt device="$GITHUB_WORKSPACE/build/docker" mx-build

      # Content-addressed, so it survives checkout resetting source mtimes.
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: build/docker/.ccache
          key: ccache-${{ runner.os }}-gate-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-gate-

      - name: Quality gate
        run: make check

      - name: Run tests
        run: make test

      # Static-analysis gates on the gen/ generator. Each fails the build below
      # its floor (GEN_QUALITY_FLOOR / GEN_LINT_FLOOR in the Makefile). Reuses
      # the warm mx-sdk image built by `make check` above.
      - name: gen-quality gate
        run: make gen-quality

      - name: gen-lint gate
        run: make gen-lint

      # Surface the score in the run summary and (on PRs) as a per-push comment,
      # mirroring the coverage job. always() so a gate failure still reports why.
      - name: gen-quality report
        if: always()
        run: |
          {
            echo '### gen-quality `gen/`'
            echo ''
            cat data/testOutput/gen-quality/report.md 2>/dev/null || echo '(no report produced)'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post gen-quality PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### gen-quality `gen/`'
            echo ''
            cat data/testOutput/gen-quality/report.md 2>/dev/null || echo '(no report produced)'
            echo ''
            echo 'Commit `${{ github.sha }}`.'
          } > gen-quality-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file gen-quality-comment.md

  linux-core:
    name: Linux (test-all, GCC)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-core-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-core-

      - name: Full test suite
        run: make test-all

  coverage:
    name: Linux (coverage-core-dev)
    runs-on: ubuntu-latest

    # pull-requests: write lets the coverage comment post on PRs.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # Same container-driver + runtime-token setup as linux-gate so the
      # coverage stage reuses the warm toolchain layer cache. Coverage runs in
      # the pinned container via `make coverage-core-dev`; it is advisory (no
      # gate) and runs in parallel with the other jobs.
      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3

      # Bind-back mx-build so its ccache dir is cacheable, as in linux-gate. A
      # distinct key prefix keeps this job's save from racing linux-gate's.
      - name: Create bind-backed build volume
        run: |
          mkdir -p build/docker
          docker volume create --driver local \
            --opt type=none --opt o=bind \
            --opt device="$GITHUB_WORKSPACE/build/docker" mx-build

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: build/docker/.ccache
          key: ccache-${{ runner.os }}-coverage-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-coverage-

      - name: Build + run with coverage
        run: make coverage-core-dev

      # Turn gcovr's 3-line summary (data/testOutput/coverage/summary.txt, e.g.
      # "lines: 52.1% (17624 out of 33846)") into a Markdown table reused by
      # both the job summary and the PR comment.
      - name: Build coverage table
        if: always()
        run: |
          {
            echo '| Metric | Coverage | Covered / Total |'
            echo '|---|---:|---:|'
            awk '/^(lines|functions|branches):/ {
              m=$1; sub(":","",m);
              c=$3; sub("[(]","",c);
              t=$6; sub("[)]","",t);
              M=toupper(substr(m,1,1)) substr(m,2);
              printf "| %s | %s | %s / %s |\n", M, $2, c, t
            }' data/testOutput/coverage/summary.txt
          } > table.md
          {
            echo '### Core-dev coverage `src/private/mx/core/`'
            echo ''
            cat table.md
          } >> "$GITHUB_STEP_SUMMARY"

      # Single self-contained page, stored (compression-level 0). GitHub still
      # delivers artifacts as a .zip -- there is no raw-file download -- so the
      # zip just holds one index.html to unzip and open.
      - name: Upload HTML report
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core-dev
          path: data/testOutput/coverage/index.html
          compression-level: 0

      - name: Compose PR comment
        if: github.event_name == 'pull_request'
        run: |
          {
            echo '### Core-dev coverage `src/private/mx/core/`'
            echo ''
            cat table.md
            echo ''
            echo '[Download HTML report](${{ steps.upload.outputs.artifact-url }}) - unzip and open `index.html`.'
            echo ''
            echo 'Commit `${{ github.sha }}`.'
          } > comment.md

      # gh pr comment posts a fresh comment each run, so the PR keeps a
      # per-push coverage history instead of overwriting one sticky comment.
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md

  macos:
    name: macOS (test)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-build-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Run tests
        run: make test

  windows:
    name: Windows (test)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install make
        run: choco install make -y

      - name: Run tests
        shell: bash
        run: make test

  xcode:
    name: Xcode (advisory)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate project
        run: make xcode-gen

      - name: Build
        run: make xcode-build

      - name: Test
        run: make xcode-test
