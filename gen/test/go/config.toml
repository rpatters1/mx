# Go generator target configuration.
# A test target that keeps the generator honest about extensibility: MusicXML
# 3.1, and deliberately WITHOUT the sounds.xml companion -- the counterpart to
# the C target (same 3.1 schema, sounds on), so the two differ only by the fold.
#
# The generator is language agnostic (the cardinal rule): everything Go-shaped
# about this target lives here and in its templates, never in generator code.

[input]
# MusicXML XSD this target generates from, relative to this config file.
xsd = "../../../docs/musicxml-3.1-8bbe8e5.xsd"

[output]
# Directory for generated source files, relative to this config file.
dir = "mx"

# No [sounds] section: instrument-sound stays a plain string for this target.

[target]
# Go constants are package-scoped, so enum/union constants compose the type
# name into one flat namespace (NoteTypeValue1024th).
variant-scope = "composed"

[naming]
extends = "../../naming.base.toml"  # schema-forced renames shared by all targets
# Exported Go identifiers: types, fields, and enum constants are all Pascal.
field-convention   = "pascal"
variant-convention = "pascal"

[types]
# IR primitive -> Go spelling. This non-validating harness gives the
# NCName-derived identity primitives the same string spelling as token, so
# the lexical distinction the IR preserves costs it nothing.
string               = "string"
token                = "string"
nmtoken              = "string"
id                   = "string"
idref                = "string"
date                 = "string"
decimal              = "float64"
integer              = "int"
positive_integer     = "int"
non_negative_integer = "int"

[reserved]
# Go keywords and predeclared identifiers a generated identifier must not be.
words = [
    # keywords
    "break", "case", "chan", "const", "continue", "default", "defer",
    "else", "fallthrough", "for", "func", "go", "goto", "if", "import",
    "interface", "map", "package", "range", "return", "select", "struct",
    "switch", "type", "var",
    # predeclared identifiers
    "any", "append", "bool", "byte", "cap", "clear", "close", "comparable",
    "complex", "complex64", "complex128", "copy", "delete", "error",
    "false", "float32", "float64", "imag", "int", "int8", "int16", "int32",
    "int64", "iota", "len", "make", "max", "min", "new", "nil", "panic",
    "print", "println", "real", "recover", "rune", "string", "true",
    "uint", "uint8", "uint16", "uint32", "uint64", "uintptr",
]
# Names this target's templates synthesize: the ordered-children field, and
# the Child/Kind type-name compositions. The collision gate enforces these.
members = ["Children"]
type-suffixes = ["Child", "Kind"]

# ---- the render manifest: which templates produce which files ----------- #
# The presence of [render] selects the press pipeline; everything Go-shaped
# lives in templates/ and here, never in generator code. gofmt owns the
# final formatting (tabwriter alignment), exactly as Go codegen convention
# expects.

[render]
dir = "templates"
format = ["gofmt", "-w", "{dir}"]

[[render.type]]
strategies = ["enum-class"]
template   = "enum.go.tmpl"
output     = "{snake}.go"

[[render.type]]
strategies = ["numeric-wrapper"]
template   = "number.go.tmpl"
output     = "{snake}.go"

[[render.type]]
strategies = ["string-wrapper"]
template   = "string.go.tmpl"
output     = "{snake}.go"

[[render.type]]
strategies = ["tagged-variant"]
template   = "union.go.tmpl"
output     = "{snake}.go"

[[render.type]]
strategies = ["value-class", "composite-class", "flag", "attrs-class"]
template   = "complex.go.tmpl"
output     = "{snake}.go"

[[render.type]]
strategies = ["inherit"]
template   = "inherit.go.tmpl"
output     = "{snake}.go"

# Bespoke handling: a `types` row claims specific types by wire name and
# overrides the strategy rows for them. yyyy-mm-dd gets typed date-component
# accessors (Yyyy/Mm/Dd -> int) the stock string template has no business
# growing.
[[render.type]]
types    = ["yyyy-mm-dd"]
template = "yyyy_mm_dd.go.tmpl"
output   = "{snake}.go"

[[render.once]]
template = "runtime.go.tmpl"
output   = "runtime.go"

[[render.once]]
template = "document.go.tmpl"
output   = "document.go"
