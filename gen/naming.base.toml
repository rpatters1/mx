# Shared naming base for every target ([naming] extends in each config.toml).
# Holds renames that are forced by the schema itself rather than by any one
# language, so they stay identical across targets. A target's own entries win
# over these on any conflict.

# `barline` carries both child ELEMENTS segno/coda (the visible symbols) and
# ATTRIBUTES segno/coda (sound/playback jump markers). Any field casing
# collapses each pair to one identifier, so every code target collides. The
# elements keep their wire-true names; the attributes are qualified.
[rename.attribute.barline]
segno = "segno-sound"
coda = "coda-sound"

# `score-part` carries both a child ELEMENT literally named "group" and an
# anonymous midi-device/midi-instrument pair sequence that the content
# projection hoists as `score-part-group` -- whose field name would also be
# "group". Schema-forced, so every structural target collides identically.
[rename.type]
"score-part-group" = "score-part-midi-group"
