# Measure music-data is the known large-alternative repeated choice (plan
# §2.3): its alternatives are boxed so a by-value variant does not size
# every slot at the largest alternative. Which types box is this manifest
# data, not template hardcode.
[[render.type]]
types    = ["music-data-choice"]
template = "choice_boxed.h.tmpl"
output   = "{pascal}.h"

[[render.type]]
types    = ["music-data-choice"]
template = "choice_boxed.cpp.tmpl"
output   = "{pascal}.cpp"

# ---- once-per-target outputs --------------------------------------------- #

[[render.once]]
template = "version.h.tmpl"
output   = "Version.h"

[[render.once]]
template = "document.h.tmpl"
output   = "Document.h"

[[render.once]]
