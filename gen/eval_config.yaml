# Codegen diff scoring configuration.
#
# To add a new zero-cost pattern, put it under the appropriate category
# in line_rules. Patterns are Python regex matched against the diff line
# content (without the +/- prefix). First matching rule wins.

weights:
  GOOD: 0
  EXPECTED: 0
  COSMETIC: 0.5
  STRUCTURAL: 5
  WRONG: 10

# Default category for lines that match no rule.
defaults:
  ".h": STRUCTURAL
  ".cpp": STRUCTURAL

# Files where ALL changes get this category.
# Use for files with known acceptable differences.
file_categories:
  EXPECTED:
    - "NotationsChoice.h"
    - "NotationsChoice.cpp"
    - "Notations.cpp"
    - "OrnamentsChoice.h"
    - "OrnamentsChoice.cpp"
    - "Ornaments.cpp"
    - "Ornaments.h"
  GOOD: []

# Line-level pattern rules. First match wins.
# "pattern" is Python regex matched against line content.
line_rules:
  GOOD:
    - pattern: "Color color"
      description: "Color attribute member (fixing original omission)"
    - pattern: "hasColor"
      description: "Color hasColor flag (fixing original omission)"
    - pattern: '#include "mx/core/Color.h"'
      description: "Color include (fixing original omission)"
    - pattern: "bool hasColor"
      description: "Color hasColor member added"

  EXPECTED:
    - pattern: "(?i)backport"
      description: "MusicXML 4.0 backport reference"
    - pattern: "UpDownNone"
      description: "MusicXML 4.0 backport type (UpDownNone -> UpDown in 3.x)"

    # These attribute members are being correctly added by the generator
    # for types where the original code was missing them.
    - pattern: "Valign valign"
      description: "Valign attribute added (fixing omission)"
    - pattern: "hasValign"
      description: "Valign flag added (fixing omission)"
    - pattern: "XmlLang lang"
      description: "XmlLang attribute added (fixing omission)"
    - pattern: "TextDirection dir"
      description: "TextDirection attribute added (fixing omission)"
    - pattern: "XmlSpace space"
      description: "XmlSpace attribute added (fixing omission)"

  COSMETIC:
    - pattern: "MX_RETURN_IS_SUCCESS"
      description: "Macro vs direct return inconsistency"
    - pattern: "return isSuccess;"
      description: "Direct return vs macro inconsistency"
    - pattern: "MX_UNUSED\\(xelement\\)"
      description: "MX_UNUSED(xelement) presence inconsistency"
    - pattern: "setAttributes\\(const.*&attributes\\)"
      description: "setAttributes parameter named attributes vs value"
    - pattern: "setAttributes\\(const.*&value\\)"
      description: "setAttributes parameter named value vs attributes"
    - pattern: "/\\* _+"
      description: "Section comment header formatting"
    - pattern: "_+ \\*/"
      description: "Section comment header formatting"
